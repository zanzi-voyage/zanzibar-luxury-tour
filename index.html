<!-- ===== HERO + NAVBAR START ===== -->
<style>
.mulas-hero {
  position: relative;
  width: 100%;
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5ce?auto=format&fit=crop&w=1600&q=80") no-repeat center/cover;
  font-family: Arial, sans-serif;
}

/* overlay */
.mulas-hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
  left: 0;
}

/* NAVBAR */
.mulas-nav {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 2;
}

.mulas-logo {
  color: white;
  font-size: 22px;
  font-weight: bold;
}

/* MENU */
.mulas-menu {
  display: flex;
  gap: 25px;
}

.mulas-menu a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* HAMBURGER */
.mulas-toggle {
  display: none;
  font-size: 26px;
  color: white;
  cursor: pointer;
}

/* HERO CONTENT */
.mulas-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

.mulas-content h1 {
  font-size: 48px;
}

.mulas-content p {
  margin: 15px 0;
}

.mulas-btn {
  padding: 14px 28px;
  background: #00c853;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}

/* MOBILE */
@media (max-width: 768px) {
  .mulas-menu {
    position: absolute;
    top: 70px;
    right: 0;
    background: rgba(0,0,0,0.9);
    flex-direction: column;
    width: 200px;
    padding: 20px;
    display: none;
  }

  .mulas-menu.active {
    display: flex;
  }

  .mulas-toggle {
    display: block;
  }
}
</style>

<div class="mulas-hero">

  <!-- NAVBAR -->
  <div class="mulas-nav">
    <div class="mulas-logo">Mulas Adventures</div>

    <div class="mulas-menu" id="menu">
      <a href="#">Home</a>
      <a href="#">Tours</a>
      <a href="#">Safari</a>
      <a href="#">Contact</a>
    </div>

    <div class="mulas-toggle" onclick="toggleMenu()">☰</div>
  </div>

  <!-- HERO TEXT -->
  <div class="mulas-content">
    <div>
      <h1>Explore Zanzibar</h1>
      <p>Discover beaches, сафари & unforgettable experiences</p>
      <a href="#" class="mulas-btn">Start Your Journey</a>
    </div>
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>
<!-- ===== HERO + NAVBAR END ===== -->
