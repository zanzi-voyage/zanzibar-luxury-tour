<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanzibar Old Travel</title>

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  margin: 0;
  padding: 0;
}

/* HERO */
.hero{
  width: 100%;
  height: 100vh;
  background-image: url("https://images.unsplash.com/photo-1586500036706-41963de24d8b?q=80");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* overlay */
.hero::before{
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero-content{
  position: relative;
  color: white;
  text-align: center;
}
</style>

</head>

<body>

<section id="home" class="hero">
  <div class="hero-content">
    <h1>Zanzibar Old Travel</h1>
    <p>Discover Zanzibar beauty. master ki is the food with a lot of fruits</p>
  </div>
</section








<!-- FLOAT LANGUAGE BUTTON -->
<div class="lang-float">
  <button onclick="toggleLang()">🌐 EN</button>

  <div id="langBox" class="lang-box">
    <div onclick="setLang('it')">🇮🇹 Italiano</div>
    <div onclick="setLang('ru')">🇷🇺 Русский</div>
    <div onclick="setLang('es')">🇪🇸 Español</div>
    <div onclick="setLang('pt')">🇵🇹 Português</div>
    <div onclick="setLang('de')">🇩🇪 Deutsch</div>
    <div onclick="setLang('cs')">🇨🇿 Čeština</div>
    <div onclick="setLang('en')">🇬🇧 English</div>
  </div>
</div>

<style>
.lang-float{
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: Arial;
  z-index: 9999;
}

.lang-float button{
  background: #ff7a00;
  color: #fff;
  border: none;
  padding: 12px 15px;
  border-radius: 50px;
  cursor: pointer;
}

.lang-box{
  display: none;
  position: absolute;
  bottom: 60px;
  right: 0;
  background: #fff;
  width: 180px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}

.lang-box div{
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
}

.lang-box div:hover{
  background: #f2f2f2;
}
</style>














    <!-- GOOGLE TRANSLATE HIDE FIX (ONLY ONCE) -->
<style>
.goog-te-banner-frame,
.goog-te-balloon-frame {
  display: none !important;
}

body {
  top: 0px !important;
  position: static !important;
}

.goog-te-gadget {
  color: transparent !important;
}
.goog-te-gadget span {
  display: none !important;
}
</style>

<script>
// toggle dropdown
function toggleLang(){
  const box = document.getElementById("langBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// set language using Google Translate
function setLang(lang){
  let select = document.querySelector("select.goog-te-combo");
  if(select){
    select.value = lang;
    select.dispatchEvent(new Event("change"));
  }
}
</script>

<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>




<script>
  function setLang(lang){
  let check = setInterval(() => {
    let select = document.querySelector("select.goog-te-combo");

    if(select){
      select.value = lang;
      select.dispatchEvent(new Event("change"));
      clearInterval(check);
    }
  }, 300);
}
</script>
