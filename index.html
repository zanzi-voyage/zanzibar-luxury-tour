<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mulas Adventures | Zanzibar Tours</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#fff;
      color:#222;
    }

    /* HEADER */
    header{
      position: absolute;
      top:0;
      left:0;
      width:100%;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:100;
    }

    header h1{
      color:white;
      font-size:24px;
    }

    header nav a{
      color:white;
      margin-left:20px;
      text-decoration:none;
      font-weight:500;
    }

    /* HERO */
    .hero {
      height:100vh;
      width:100%;
      background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80");
      background-size:cover;
      background-position:center;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero h1{
      font-size:50px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:18px;
      max-width:600px;
      margin-bottom:20px;
    }

    .btn{
      padding:12px 25px;
      border:none;
      border-radius:30px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-primary{
      background:#00c2ff;
      color:white;
    }

    .btn-primary:hover{
      background:#0099cc;
    }

    @media(max-width:768px){
      .hero h1{ font-size:32px; }
      header{ padding:15px 20px; }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>Mulas Adventures</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Tours</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Discover Zanzibar Paradise</h1>
  <p>Luxury tours, crystal beaches, culture & unforgettable adventures across Zanzibar</p>
  <button class="btn btn-primary">Book Your Trip</button>
</section>

</body>
</html>
